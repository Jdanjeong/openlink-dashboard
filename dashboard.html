<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>입고현황 대시보드 | OpenLink</title>
<script>
// 카카오 지도 SDK - autoload=false 방식 (콜백으로 완전 로드 보장)
window._kakaoMapReady = false;
window._kakaoMapCallback = null;
(function(){
  var s = document.createElement('script');
  s.type = 'text/javascript';
  s.async = true;
  s.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=9ca121f1d5a3a734a8cfdf6792717c07&autoload=false';
  s.onload = function() {
    kakao.maps.load(function() {
      window._kakaoMapReady = true;
      if(window._kakaoMapCallback) window._kakaoMapCallback();
    });
  };
  s.onerror = function() {
    console.error('카카오 SDK 로드 실패 (503) - 도메인 인증 필요');
    window._kakaoMapReady = 'failed';
    if(window._kakaoMapCallback) window._kakaoMapCallback();
  };
  document.head.appendChild(s);
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ban:#C8281E;  --ban-bg:#FFF1F0; --ban-bd:#FFCCC7;
  --warn:#8A6300; --warn-bg:#FFFBE6;--warn-bd:#FFE58F;
  --ok:#237804;   --ok-bg:#F6FFED;  --ok-bd:#B7EB8F;
  --dark:#1A1A2E; --mid:#64748B;    --lt:#94A3B8;
  --bg:#F1F5F9;   --white:#fff;     --bd:#E2E8F0;
  --hh:56px; --bh:0px;
  --font:'Apple SD Gothic Neo','Noto Sans KR','맑은 고딕',sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:13px;color:var(--dark);background:var(--bg)}

/* ── 헤더 ── */
#hd{
  position:fixed;top:0;left:0;right:0;height:var(--hh);z-index:300;
  background:linear-gradient(135deg,#0D1B2A 0%,#1A3550 100%);
  border-bottom:2px solid #00AAEE;
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
#hd img{height:26px;object-fit:contain;filter:brightness(0) invert(1);flex-shrink:0}
#hd-sep{width:1px;height:22px;background:rgba(255,255,255,.2);flex-shrink:0}
#hd-ttl{font-size:16px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.3px}
#hd-r{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
#hd-dt{font-size:10px;color:rgba(255,255,255,.45);text-align:right;margin-bottom:1px}
#hd-ck{font-size:21px;font-weight:200;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums}

/* 달력 버튼 (헤더 우측) */
#hd-cal{
  display:flex;align-items:center;gap:5px;padding:6px 13px;
  border:1px solid rgba(255,255,255,.28);border-radius:6px;
  color:rgba(255,255,255,.85);font-size:12px;font-weight:500;
  cursor:pointer;background:rgba(255,255,255,.08);font-family:var(--font);
  transition:.15s;white-space:nowrap;
}
#hd-cal:hover{background:rgba(255,255,255,.16)}
#hd-cal .cur-date{
  font-size:13px;font-weight:700;color:#fff;
  background:rgba(255,255,255,.15);padding:2px 8px;border-radius:4px;margin-left:4px;
}

#hd-btn{
  display:flex;align-items:center;gap:4px;padding:6px 12px;
  border:1px solid rgba(255,255,255,.25);border-radius:6px;
  color:rgba(255,255,255,.75);font-size:11px;
  cursor:pointer;background:rgba(255,255,255,.05);font-family:var(--font);
}
#hd-btn:hover{background:rgba(255,255,255,.14)}
.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 달력 팝업 ── */
#cal-pop{
  position:fixed;top:var(--hh);right:16px;
  background:var(--white);border:1px solid var(--bd);border-radius:10px;
  padding:16px;z-index:400;box-shadow:0 8px 28px rgba(0,0,0,.16);
  display:none;width:256px;
}
#cal-pop.open{display:block}
#cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cnb{background:none;border:none;cursor:pointer;font-size:14px;color:var(--mid);padding:2px 8px;border-radius:4px}
.cnb:hover{background:var(--bg)}
#cal-ml{font-size:14px;font-weight:700;color:var(--dark)}
#cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cdow{font-size:10px;color:var(--lt);padding:3px 0;font-weight:600}
.cday{font-size:12px;padding:5px 2px;border-radius:5px;cursor:pointer;color:var(--mid)}
.cday:hover{background:var(--bg)}
.cday.has-data{color:var(--dark);font-weight:600}
.cday.has-ban{background:var(--ban-bg);color:var(--ban);font-weight:700;border:1px solid var(--ban-bd)}
.cday.has-warn{background:var(--warn-bg);color:var(--warn);font-weight:600}
.cday.sel{background:var(--dark)!important;color:#fff!important;border:none!important}
.cday.today{box-shadow:0 0 0 1.5px var(--dark)}
.cday.empty{cursor:default}

/* ── 메인 레이아웃 ── */
#main{
  position:fixed;top:var(--hh);left:0;right:0;bottom:0;
  display:flex;
}

/* 좌측 50%: 지도 */
#map-col{width:50%;height:100%;position:relative;flex-shrink:0;z-index:1;user-select:none;-webkit-user-select:none}
#map{width:100%;height:100%;background:#e8eef4;display:block;cursor:grab}
#map:active{cursor:grabbing}

/* 지도 위 요약 */
#ms{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:10;pointer-events:none}
#map-reset{position:absolute;top:10px;right:10px;z-index:10;padding:7px 13px;background:var(--white);border:1px solid var(--bd);border-radius:6px;font-size:12px;font-weight:600;color:var(--dark);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.12);font-family:var(--font);display:flex;align-items:center;gap:5px;}
#map-reset:hover{background:var(--bg);border-color:var(--dark)}
.msc{
  background:var(--white);border-radius:8px;border:1px solid var(--bd);
  padding:8px 12px;text-align:center;min-width:70px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.msv{font-size:21px;font-weight:700;line-height:1;margin-bottom:2px}
.msl{font-size:9px;color:var(--mid);font-weight:500}
.msv.ban{color:var(--ban)}
.msv.warn{color:#D48806}
.msv.ok{color:var(--ok)}

/* 범례 */
#leg{
  position:absolute;bottom:28px;left:10px;
  background:rgba(255,255,255,.95);border:1px solid var(--bd);border-radius:8px;
  padding:10px 12px;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.lt-title{font-size:9px;font-weight:700;color:var(--mid);margin-bottom:6px;letter-spacing:.5px}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11px;color:var(--dark)}
.lr:last-child{margin-bottom:0}
.ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ld.ban{background:var(--ban)}
.ld.warn{background:#FAAD14}
.ld.ok{background:#52C41A}
.ld.none{background:#CBD5E1}

/* 마커 팝업 */
#pop{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--white);border-radius:11px;
  padding:16px 18px 15px;min-width:300px;max-width:400px;
  box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:10;display:none;
  border-top:3px solid var(--bd);
}
#pop.show{display:block}
#pop.ban-p{border-top-color:var(--ban)}
#pop.warn-p{border-top-color:#FAAD14}
#pop.ok-p{border-top-color:var(--ok)}
#pop-x{position:absolute;top:9px;right:11px;font-size:14px;cursor:pointer;color:var(--lt);background:none;border:none}
.ph{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pn{font-size:16px;font-weight:800}
.pb{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap}
.pb.ban{background:var(--ban-bg);color:var(--ban);border:1px solid var(--ban-bd)}
.pb.warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bd)}
.pb.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.pa{font-size:12px;color:var(--mid);margin-bottom:10px;line-height:1.5}
.plbl{font-size:10px;color:var(--lt);font-weight:600;margin-bottom:4px}
.pps{display:flex;gap:5px;margin-bottom:8px}
.pp{flex:1;text-align:center;padding:7px 3px;border-radius:6px}
.pp .pv{font-size:20px;font-weight:700;display:block;margin-bottom:2px}
.pp .pl{font-size:10px;font-weight:600}
.pp.w{background:#EFF6FF;color:#1D4ED8}
.pp.h{background:#F0FDF4;color:#166534}
.pp.t{background:#F5F3FF;color:#6D28D9}
.prb{
  width:100%;padding:7px;background:var(--ban-bg);
  border:1px solid var(--ban-bd);border-radius:6px;
  font-size:11px;font-weight:700;color:var(--ban);cursor:pointer;font-family:var(--font);
}
.prb:hover{background:#FFE0DE}

/* ── 우측 50%: 제한 + 금지 나란히 ── */
#list-col{
  width:50%;height:100%;display:flex;border-left:1px solid var(--bd);overflow:hidden;
}

/* 제한(노란) */
#warn-col{
  flex:1;display:flex;flex-direction:column;
  border-right:1px solid var(--bd);background:var(--white);min-width:0;
}
/* 금지(빨간) */
#ban-col{
  flex:1;display:flex;flex-direction:column;
  background:var(--white);min-width:0;
}

/* 컬럼 헤더 */
.col-hd{
  padding:11px 13px 9px;border-bottom:1px solid var(--bd);flex-shrink:0;
}
.col-hd-top{display:flex;align-items:center;gap:8px}
.col-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:10px;display:flex;align-items:center;gap:3px}
.col-badge.ban{background:var(--ban);color:#fff}
.col-badge.warn{background:#FAAD14;color:#fff}
.col-cnt{font-size:24px;font-weight:700;line-height:1}
.col-cnt.ban{color:var(--ban)}
.col-cnt.warn{color:#D48806}
.col-date{font-size:10px;color:var(--lt);margin-left:auto}

/* 사유필요 알림 */
.nr-alert{
  padding:6px 13px;background:#FFF1F0;border-bottom:1px solid var(--ban-bd);
  font-size:10px;color:var(--ban);font-weight:600;cursor:pointer;
  display:none;flex-shrink:0;
}
.nr-alert.show{display:block}
.nr-alert:hover{background:#FFE0DE}

/* 검색 */
.col-srch{padding:7px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.col-inp{
  width:100%;padding:6px 9px;border:1px solid var(--bd);
  border-radius:5px;font-size:11px;outline:none;font-family:var(--font);
}
.col-inp.ban:focus{border-color:var(--ban)}
.col-inp.warn:focus{border-color:#FAAD14}

/* 카드 리스트 */
.col-list{flex:1;overflow:hidden;padding:0;position:relative}
.col-list::-webkit-scrollbar{display:none}

/* 롤링 래퍼 */
.roll-wrap{
  padding:8px 8px 8px;
  will-change:transform;
}
.roll-wrap.rolling{
  animation:none; /* JS로 제어 */
}

/* 상단/하단 페이드 */
.col-list::before,.col-list::after{
  content:'';position:absolute;left:0;right:0;height:28px;z-index:5;pointer-events:none;
}
.col-list::before{top:0;background:linear-gradient(to bottom,var(--white),transparent)}
.col-list::after{bottom:0;background:linear-gradient(to top,var(--white),transparent)}

/* 입고금지 카드 */
.bc{
  border-radius:8px;border:1px solid var(--ban-bd);background:var(--ban-bg);
  cursor:pointer;transition:all .12s;margin-bottom:7px;
}
.bc:hover{box-shadow:0 3px 10px rgba(200,40,30,.22);transform:translateY(-1px)}
.bc.on{box-shadow:0 0 0 2px var(--ban);transform:translateY(-1px)}
.bc.nr{border-color:var(--ban);border-width:2px}
.bc-top{padding:9px 11px 6px;border-bottom:1px solid var(--ban-bd)}
.bc-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.bc-seq{font-size:9px;font-weight:700;color:var(--ban);background:#fff;border:1px solid var(--ban-bd);padding:1px 5px;border-radius:3px;flex-shrink:0}
.bc-nm{font-size:14px;font-weight:800;color:var(--ban);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bc-nr-badge{flex-shrink:0;background:var(--ban);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.bc-ad{font-size:10px;color:#9B2335;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.bc-bt{padding:7px 11px;display:flex;align-items:center;gap:5px}
.bcp{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.bcp.w{background:#DBEAFE;color:#1E40AF}
.bcp.h{background:#DCFCE7;color:#166534}
.bcp.t{background:#EDE9FE;color:#5B21B6}
.bc-rl{margin-left:auto;font-size:9px;color:var(--ban);font-weight:700;text-decoration:underline;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* 입고제한 카드 */
.wc{
  border-radius:8px;border:1px solid var(--warn-bd);background:var(--warn-bg);
  cursor:pointer;transition:all .12s;margin-bottom:7px;
}
.wc:hover{box-shadow:0 3px 8px rgba(200,140,0,.2);transform:translateY(-1px)}
.wc.on{box-shadow:0 0 0 2px #FAAD14;transform:translateY(-1px)}
.wc-top{padding:9px 11px 6px;border-bottom:1px solid var(--warn-bd)}
.wc-row1{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.wc-seq{font-size:9px;font-weight:700;color:var(--warn);background:#fff;border:1px solid var(--warn-bd);padding:1px 5px;border-radius:3px;flex-shrink:0}
.wc-nm{font-size:14px;font-weight:800;color:var(--warn);flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wc-ad{font-size:10px;color:#875500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wc-bt{padding:7px 11px;display:flex;gap:5px}
.wcp{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500}
.wcp.w{background:#DBEAFE;color:#1E40AF}
.wcp.h{background:#DCFCE7;color:#166534}
.wcp.t{background:#EDE9FE;color:#5B21B6}

/* 빈 상태 */
.empty{padding:32px 12px;text-align:center}
.empty-ic{font-size:32px;margin-bottom:8px}
.empty-ms{font-size:12px;color:var(--mid);font-weight:500}
.empty-sb{font-size:10px;color:var(--lt);margin-top:3px}

/* 사유 접수 바 */
#reason-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--white);border-top:1px solid var(--bd);
  box-shadow:0 -2px 8px rgba(0,0,0,.07);
}
#reason-toggle{
  padding:8px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-size:11px;font-weight:600;color:var(--mid);
}
#reason-toggle:hover{background:var(--bg)}
#rbadge{background:var(--ban);color:#fff;font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px}
#rl{display:none;max-height:180px;overflow-y:auto;border-top:1px solid var(--bd)}
#rl.open{display:block}
.ri{padding:9px 16px;border-bottom:1px solid #F1F5F9;font-size:11px}
.ri-tp{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.ri-fn{font-weight:700;color:var(--dark)}
.ri-dt{background:var(--ban-bg);color:var(--ban);padding:1px 5px;border-radius:3px;font-size:10px}
.ri-rs{color:var(--mid);line-height:1.5;margin-bottom:2px}
.ri-mt{color:var(--lt);font-size:10px}

/* 모달 */
#mo-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center}
#mo-ov.show{display:flex}
#mo{background:var(--white);border-radius:13px;padding:22px 24px;width:460px;max-width:92vw;box-shadow:0 12px 44px rgba(0,0,0,.22)}
.mo-ic{font-size:26px;margin-bottom:7px}
.mo-tl{font-size:15px;font-weight:700;margin-bottom:3px}
.mo-sb{font-size:11px;color:var(--mid);margin-bottom:14px}
.mo-info{background:var(--ban-bg);border:1px solid var(--ban-bd);border-radius:7px;padding:9px 12px;font-size:11px;color:var(--ban);margin-bottom:13px;line-height:1.7;font-weight:500}
.mo-fd{margin-bottom:12px}
.mo-lb{font-size:11px;font-weight:700;color:var(--mid);margin-bottom:4px;display:block}
.mo-in,.mo-ta{width:100%;padding:8px 11px;border:1px solid var(--bd);border-radius:7px;font-size:12px;outline:none;font-family:var(--font)}
.mo-ta{resize:vertical;min-height:85px;line-height:1.7}
.mo-in:focus,.mo-ta:focus{border-color:var(--ban);box-shadow:0 0 0 3px rgba(200,40,30,.1)}
.mo-bts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.mo-btn{padding:9px 20px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font)}
.mo-cc{background:var(--bg);color:var(--dark)}
.mo-sm{background:var(--ban);color:#fff}
.mo-cc:hover{background:#E2E8F0}
.mo-sm:hover{opacity:.88}

/* 로딩 */
#ld{position:fixed;inset:0;background:rgba(255,255,255,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:13px}
#ld.hidden{display:none}
.ld-sp{width:38px;height:38px;border:3px solid #E2E8F0;border-top-color:var(--dark);border-radius:50%;animation:spin .8s linear infinite}
#ld-ms{font-size:13px;color:var(--mid);font-weight:500}
#ld-pg{font-size:11px;color:var(--lt)}
</style>
</head>
<body>

<div id="ld">
  <div class="ld-sp"></div>
  <div id="ld-ms">데이터 불러오는 중...</div>
  <div id="ld-pg"></div>
</div>

<!-- 헤더 -->
<div id="hd">
  <img src="https://taksong-driver.openmile.kr/openlink.png" onerror="this.style.display='none'" alt="OpenLink">
  <div id="hd-sep"></div>
  <div id="hd-ttl">입고현황 모니터링 대시보드</div>
  <div id="hd-r">
    <div>
      <div id="hd-dt"></div>
      <div id="hd-ck"></div>
    </div>
    <!-- 날짜 선택 버튼 (달력 토글) -->
    <button id="hd-cal" onclick="toggleCal()">
      📅 조회일 <span class="cur-date" id="hd-cur-date">-</span>
    </button>
    <button id="hd-btn" onclick="loadData()">
      <span id="ref-ic">↺</span>
    </button>
  </div>
</div>

<!-- 달력 팝업 -->
<div id="cal-pop">
  <div id="cal-nav">
    <button class="cnb" onclick="calMove(-1)">◀</button>
    <div id="cal-ml"></div>
    <button class="cnb" onclick="calMove(1)">▶</button>
  </div>
  <div id="cal-grid"></div>
</div>

<!-- 메인 -->
<div id="main">

  <!-- 좌측 50%: 지도 -->
  <div id="map-col">
    <div id="map"></div>
    <div id="ms">
      <div class="msc"><div class="msv ban" id="ms-b">-</div><div class="msl">🔴 금지</div></div>
      <div class="msc"><div class="msv warn" id="ms-w">-</div><div class="msl">🟡 제한</div></div>
      <div class="msc"><div class="msv ok" id="ms-o">-</div><div class="msl">🟢 원활</div></div>
      <div class="msc" style="min-width:82px"><div class="msv" id="ms-t" style="color:#374151;font-size:18px">-</div><div class="msl">당일접수</div></div>
    </div>
    <div id="leg">
      <div class="lt-title">마커 범례</div>
      <div class="lr"><div class="ld ban"></div>입고금지 (!)</div>
      <div class="lr"><div class="ld warn"></div>입고제한</div>
      <div class="lr"><div class="ld ok"></div>원활</div>
      <div class="lr"><div class="ld none"></div>실적없음</div>
    </div>
    <div id="pop">
      <button id="pop-x" onclick="closePop()">✕</button>
      <div class="ph"><div class="pn" id="pop-nm"></div><div class="pb" id="pop-bd"></div></div>
      <div class="pa" id="pop-ad"></div>
      <div class="plbl">당일 접수 (전일대비 증가)</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzTq2_bhxoOJriaj5bz75bbxVHDJ685qlAcWZDd4IfFmLlKfWWhXiaTTtP-8gnVkXvE0w/exec';

// JSONP 호출 (GAS CORS 우회)
function gasCall(params, callback) {
  var cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  window[cbName] = function(data) {
    delete window[cbName];
    document.head.removeChild(script);
    callback(null, data);
  };
  var qs = Object.keys(params).map(function(k){
    return k + '=' + encodeURIComponent(
      typeof params[k]==='object' ? JSON.stringify(params[k]) : params[k]
    );
  }).join('&');
  var script = document.createElement('script');
  script.onerror = function() {
    delete window[cbName];
    document.head.removeChild(script);
    callback(new Error('JSONP 실패'));
  };
  script.src = GAS_URL + '?' + qs + '&callback=' + cbName;
  document.head.appendChild(script);
}
var allData={}, facs=[], curDate='', allDates=[];
var markers={}, geoCache={}, selName=null, reasons=[];
var calY, calM, calOpen=false;
var naverMap=null, mapReady=false;

// ─────────────────────────────────
// 초기화
// ─────────────────────────────────
window.onload = function(){
  clock();
  var now=new Date(); calY=now.getFullYear(); calM=now.getMonth();
  waitMapReady(function(){
    mapReady=true;
    initMap();
    loadData();
    loadReasons();
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('#cal-pop')&&!e.target.closest('#hd-cal')) closeCal();
  });
};

function waitMapReady(cb){
  // 이미 로드됨
  if(window._kakaoMapReady === true){ cb(); return; }
  // 실패 상태
  if(window._kakaoMapReady === 'failed'){ cb(); return; }
  // 아직 로드 중 - 콜백 등록
  window._kakaoMapCallback = function(){
    window._kakaoMapCallback = null;
    cb();
  };
  // 20초 타임아웃 안전장치
  setTimeout(function(){
    if(window._kakaoMapCallback){
      console.warn('카카오 지도 로드 타임아웃');
      window._kakaoMapCallback = null;
      cb();
    }
  }, 20000);
}

function p2(n){return String(n).padStart(2,'0');}

function clock(){
  var D=['일','월','화','수','목','금','토'];
  function t(){
    var n=new Date();
    document.getElementById('hd-dt').textContent=n.getFullYear()+'.'+p2(n.getMonth()+1)+'.'+p2(n.getDate())+' ('+D[n.getDay()]+')';
    document.getElementById('hd-ck').textContent=p2(n.getHours())+':'+p2(n.getMinutes())+':'+p2(n.getSeconds());
  }
  t(); setInterval(t,1000);
}

function initMap(){
  if(!window.kakao || !window.kakao.maps || window._kakaoMapReady === 'failed'){
    var reason = window._kakaoMapReady === 'failed' 
      ? '카카오 도메인 인증 실패 (503)\n개발자콘솔에서 jdanjeong.github.io 등록 확인' 
      : '카카오 SDK 미로드';
    console.warn('카카오 지도 미로드 - 지도 기능 비활성화:', reason);
    document.getElementById('map').innerHTML=
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;background:#f1f5f9">'
      +'<div style="font-size:32px">🗺️</div>'
      +'<div style="font-size:13px;color:#64748B;font-weight:500">카카오 지도 로드 실패</div>'
      +'<div style="font-size:11px;color:#94A3B8">카카오 개발자 콘솔에서 도메인을 확인해주세요</div>'
      +'</div>';
    mapReady=false;
    return;
  }
  var container=document.getElementById('map');
  var options={
    center:new kakao.maps.LatLng(36.2,127.9),
    level:13,
    draggable:true,
    scrollwheel:true,
    disableDoubleClickZoom:false
  };
  naverMap=new kakao.maps.Map(container,options);
  var zc=new kakao.maps.ZoomControl();
  naverMap.addControl(zc,kakao.maps.ControlPosition.LEFT);
  mapReady=true;

  // 드래그 이벤트 강제 활성화 (마커 SVG 간섭 방지)
  kakao.maps.event.addListener(naverMap, 'dragstart', function(){});
  kakao.maps.event.addListener(naverMap, 'drag', function(){});
  kakao.maps.event.addListener(naverMap, 'dragend', function(){});
}

// ─────────────────────────────────
// 날짜 정규화
// ─────────────────────────────────
function normDate(d){
  if(!d) return '';
  var s=String(d);
  if(/^\d{1,2}\/\d{1,2}$/.test(s)) return s;
  var m=s.match(/(\w+)\s+(\w+)\s+(\d+)\s+(\d{4})/);
  if(m){
    var M={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    var mo=M[m[2]],day=parseInt(m[3]);
    if(mo&&day) return mo+'/'+day;
  }
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso) return parseInt(iso[2])+'/'+parseInt(iso[3]);
  return s;
}

// ─────────────────────────────────
// 데이터 로드
// ─────────────────────────────────
function loadData(){
  setLoad(true,'시트 데이터 불러오는 중...');
  gasCall({action:'getData'}, function(err, json){
    if(err||!json){setLoad(false);alert('로드 실패: '+(err&&err.message||'오류'));return;}
    if(json.error){setLoad(false);alert('시트 오류: '+json.error);return;}
    json.dates=(json.dates||[]).map(normDate).filter(function(d){return d&&d.indexOf('/')>=0;});
    json.latestDate=normDate(json.latestDate||'');
    (json.factories||[]).forEach(function(f){
      if(!f.history) return;
      var nh={};
      Object.keys(f.history).forEach(function(k){var nk=normDate(k);if(nk) nh[nk]=f.history[k];});
      f.history=nh;
    });
    allData=json; allDates=allData.dates||[];
    curDate=allData.latestDate||allDates[allDates.length-1]||'';
    setLoad(true,'좌표 캐시 확인 중...');
    gasCall({action:'getGeoCache'}, function(err2, cache){
      var c=cache||{};
      Object.keys(c).forEach(function(k){geoCache[k]=c[k];});
      applyDate(curDate);
    });
  });
}

// ─────────────────────────────────
// 날짜 적용
// ─────────────────────────────────
function applyDate(date){
  curDate=date;
  document.getElementById('hd-cur-date').textContent=date;
  facs=(allData.factories||[]).map(function(f){
    var h=(f.history&&f.history[date])||{woori:0,hyundai:0,total:0,banned:false,warned:false,needsReason:false,cumWoori:0,cumHyundai:0,cumTotal:0};
    var st=h.banned?'ban':h.warned?'warn':h.total>0?'ok':'none';
    return {seq:f.seq,name:f.name,name2:f.name2,addr:f.addr,
            woori:h.woori||0,hyundai:h.hyundai||0,total:h.total||0,
            cumWoori:h.cumWoori||0,cumHyundai:h.cumHyundai||0,cumTotal:h.cumTotal||0,
            isBanned:h.banned,isWarned:h.warned,status:st,needsReason:h.needsReason||false};
  });
  updStats();
  renderLists();
  geocodeAll();
  renderCal();
  setLoad(false);
}

// ─────────────────────────────────
// 통계
// ─────────────────────────────────
function cntByDate(date,type){
  return (allData.factories||[]).filter(function(f){
    var h=f.history&&f.history[date]; if(!h) return false;
    return type==='ban'?h.banned:h.warned;
  }).length;
}

function updStats(){
  var bn=facs.filter(function(f){return f.isBanned;}).length;
  var wn=facs.filter(function(f){return f.isWarned;}).length;
  var ok=facs.filter(function(f){return f.status==='ok';}).length;
  var tt=facs.reduce(function(s,f){return s+(f.total||0);},0);
  var nr=facs.filter(function(f){return f.needsReason;}).length;
  document.getElementById('ms-b').textContent=bn;
  document.getElementById('ms-w').textContent=wn;
  document.getElementById('ms-o').textContent=ok;
  document.getElementById('ms-t').textContent=tt.toLocaleString();
  document.getElementById('ban-cnt').textContent=bn;
  document.getElementById('warn-cnt').textContent=wn;
  document.getElementById('ban-date').textContent=curDate;
  document.getElementById('warn-date').textContent=curDate;
  var na=document.getElementById('nr-alert');
  if(nr>0){na.textContent='⚠️ '+nr+'개 공장: 입고금지 중 접수 증가 → 사유 제출 필요';na.classList.add('show');}
  else na.classList.remove('show');
}

// 리스트 렌더
// ─────────────────────────────────
function esc(s){return JSON.stringify(s||'');}

// data-fi(facs 인덱스) 기반 선택 - 따옴표 충돌 회피
function selFacByEl(el){
  var fi=parseInt(el.getAttribute('data-fi'));
  if(isNaN(fi)||!facs[fi]) return;
  var f=facs[fi];
  showPop(f); hilite(f.name);
  var pos=geoCache[f.addr];
  if(pos&&naverMap){naverMap.setCenter(new kakao.maps.LatLng(pos.lat,pos.lng));naverMap.setLevel(3);}
  setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'});},100);

function openModalByEl(el){
  var fi=parseInt(el.getAttribute('data-fi'));
  if(isNaN(fi)||!facs[fi]) return;
  openModalFor(facs[fi].name);
}
function e2(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function renderLists(){
  var bq=(document.getElementById('ban-inp').value||'').toLowerCase();
  var wq=(document.getElementById('warn-inp').value||'').toLowerCase();
  var banned=facs.filter(function(f){
    return f.isBanned&&(!bq||f.name.toLowerCase().indexOf(bq)>=0||f.addr.toLowerCase().indexOf(bq)>=0);
  });
  var warned=facs.filter(function(f){
    return f.isWarned&&(!wq||f.name.toLowerCase().indexOf(wq)>=0||f.addr.toLowerCase().indexOf(wq)>=0);
  });
  banned.sort(function(a,b){return (b.needsReason?1:0)-(a.needsReason?1:0)||b.total-a.total;});
  warned.sort(function(a,b){return b.total-a.total;});
  renderBan(banned);
  renderWarn(warned);
}

function renderWarn(list){

// ─────────────────────────────────
// 지오코딩 (GAS 서버)
// ─────────────────────────────────
function geocodeAll(){
  var toGeo=facs.filter(function(f){return f.addr&&!geoCache.hasOwnProperty(f.addr);});
  if(!toGeo.length){plotMarkers();return;}
  setLoad(true,'공장 위치 매핑 중...');
  var addrs=toGeo.map(function(f){return f.addr;});
  var BATCH=20; // GAS 타임아웃 방지: 20개씩 분할
  var total=addrs.length;
  var done=0;

  function nextBatch(idx){
    if(idx>=total){
      // 모든 배치 완료
      toGeo.forEach(function(f){if(!geoCache.hasOwnProperty(f.addr)) geoCache[f.addr]=null;});
      plotMarkers(); setLoad(false);
      return;
    }
    var batch=addrs.slice(idx, idx+BATCH);
    document.getElementById('ld-pg').textContent=
      Math.min(idx+BATCH,total)+' / '+total+'개 주소 변환 중...';
    gasCall({action:'geocode', addrs:batch}, function(err, result){
      var r=result||{};
      Object.keys(r).forEach(function(addr){
        var v=r[addr];
        geoCache[addr]=(v&&v.lat&&v.lng)?{lat:v.lat,lng:v.lng}:null;
      });
      done+=batch.length;
      nextBatch(idx+BATCH);
    });
  }
  nextBatch(0);
}

function plotMarkers(){
  if(!mapReady||!naverMap) return;
  Object.values(markers).forEach(function(m){m.setMap(null);}); markers={};

  facs.forEach(function(f){
    var pos=geoCache[f.addr]; if(!pos) return;
    var cfg={
      ban: {c:'#C8281E',sz:18},
      warn:{c:'#FAAD14',sz:14},
      ok:  {c:'#52C41A',sz:10},
      none:{c:'#CBD5E1',sz:7}
    }[f.status]||{c:'#CBD5E1',sz:7};

    var sz=cfg.sz;
    var svgStr='<svg xmlns="http://www.w3.org/2000/svg" width="'+(sz*2)+'" height="'+(sz*2)+'">'
      +'<circle cx="'+sz+'" cy="'+sz+'" r="'+(sz-2)+'" fill="'+cfg.c+'" stroke="white" stroke-width="2.5"/>'
      +(f.status==='ban'?'<text x="'+sz+'" y="'+(sz+4)+'" text-anchor="middle" fill="white" font-size="10" font-weight="bold">!</text>':'')
      +'</svg>';

    var markerImg=new kakao.maps.MarkerImage(
      'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr),
      new kakao.maps.Size(sz*2, sz*2),
      {offset: new kakao.maps.Point(sz, sz)}
    );

    var mk=new kakao.maps.Marker({
      position: new kakao.maps.LatLng(pos.lat, pos.lng),
      map: naverMap,
      image: markerImg,
      title: f.name,
      clickable: true
    });

    (function(factory, marker){
      kakao.maps.event.addListener(marker,'click',function(){
        showPop(factory); hilite(factory.name);
      });
    })(f, mk);

    markers[f.name]=mk;
  });
}

function hilite(name){

  Object.keys(markers).forEach(function(n){
    var mk=markers[n];

    var base={ban:{c:'#C8281E',sz:18},warn:{c:'#FAAD14',sz:14},ok:{c:'#52C41A',sz:10},none:{c:'#CBD5E1',sz:7}}[f.status]||{c:'#CBD5E1',sz:7};

    var sz=isOn?base.sz+4:base.sz;
    var stroke=isOn?'#1A1A2E':'white';
    var sw=isOn?3:2.5;

      +'<circle cx="'+sz+'" cy="'+sz+'" r="'+(sz-2)+'" fill="'+base.c+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>'
      +(f.status==='ban'?'<text x="'+sz+'" y="'+(sz+4)+'" text-anchor="middle" fill="white" font-size="10" font-weight="bold">!</text>':'')
      +'</svg>';

      new kakao.maps.Size(sz*2,sz*2),

function toggleCal(){calOpen=!calOpen;document.getElementById('cal-pop').classList.toggle('open',calOpen);if(calOpen)renderCal();}
function closeCal(){calOpen=false;document.getElementById('cal-pop').classList.remove('open');}
function calMove(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  var ML=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-ml').textContent=calY+'년 '+ML[calM];
  var dm={};
  (allDates||[]).forEach(function(d){
    var pts=d.split('/'); if(pts.length!==2) return;
    var m=parseInt(pts[0])-1, day=parseInt(pts[1]);
    if(!dm[m]) dm[m]={};
    dm[m][day]={date:d,ban:cntByDate(d,'ban'),warn:cntByDate(d,'warn')};
  });
  var grid=document.getElementById('cal-grid');
  var dows=['일','월','화','수','목','금','토'];
  var html=dows.map(function(d){return '<div class="cdow">'+d+'</div>';}).join('');
  var first=new Date(calY,calM,1).getDay();
  var days=new Date(calY,calM+1,0).getDate();
  var today=new Date();
  for(var i=0;i<first;i++) html+='<div class="cday empty"></div>';
  for(var d=1;d<=days;d++){
    var info=dm[calM]&&dm[calM][d];
    var cls='cday';
    if(info){
      if(info.ban>0) cls+=' has-ban';
      else if(info.warn>0) cls+=' has-warn';
      else cls+=' has-data';
    }
    if(info&&info.date===curDate) cls+=' sel';
    if(calY===today.getFullYear()&&calM===today.getMonth()&&d===today.getDate()) cls+=' today';
    var oc=info?(' onclick="applyDate(\''+info.date+'\');closeCal()"'):'';
    html+='<div class="'+cls+'"'+oc+'>'+d+'</div>';
  }
  grid.innerHTML=html;
}

// ── 자동 롤링 ────────────────────────────────────────────────────
var _rollTimers = {};
var _rollPos    = {ban:0, warn:0};
var _rollPaused = {ban:false, warn:false};

function startRolling(type) {
  var listEl = document.getElementById(type+'-list');
  var rollEl = document.getElementById(type+'-roll');
  if (!listEl || !rollEl) return;

  var listH  = listEl.clientHeight;   // 보이는 영역 높이
  var contH  = rollEl.scrollHeight;   // 전체 콘텐츠 높이

  // 콘텐츠가 보이는 영역보다 작으면 롤링 불필요
  if (contH <= listH) return;

  var speed  = 0.5;   // px/frame (빠르기 조절)
  var pauseT = 2000;  // 맨 위/아래에서 멈추는 시간(ms)
  var dir    = 1;     // 1=아래, -1=위

  _rollPos[type]    = 0;
  _rollPaused[type] = false;

  function frame() {
    if (_rollPaused[type]) return;
    listEl = document.getElementById(type+'-list');
    rollEl = document.getElementById(type+'-roll');
    if (!listEl || !rollEl) return;

    listH = listEl.clientHeight;
    contH = rollEl.scrollHeight;
    var maxScroll = contH - listH;
    if (maxScroll <= 0) return;

    _rollPos[type] += speed * dir;

    // 맨 아래 도달
    if (_rollPos[type] >= maxScroll) {
      _rollPos[type] = maxScroll;
      rollEl.style.transform = 'translateY(-' + _rollPos[type] + 'px)';
      _rollPaused[type] = true;
      setTimeout(function() {
        dir = -1;
        _rollPaused[type] = false;
        _rollTimers[type] = requestAnimationFrame(frame);
      }, pauseT);
      return;
    }
    // 맨 위 도달
    if (_rollPos[type] <= 0) {
      _rollPos[type] = 0;
      rollEl.style.transform = 'translateY(0)';
      _rollPaused[type] = true;
      setTimeout(function() {
        dir = 1;
        _rollPaused[type] = false;
        _rollTimers[type] = requestAnimationFrame(frame);
      }, pauseT);
      return;
    }

    rollEl.style.transform = 'translateY(-' + _rollPos[type] + 'px)';
    _rollTimers[type] = requestAnimationFrame(frame);
  }

  // 마우스 올리면 일시정지
  listEl.onmouseenter = function(){ _rollPaused[type]=true; };
  listEl.onmouseleave = function(){ _rollPaused[type]=false; _rollTimers[type]=requestAnimationFrame(frame); };

  if (_rollTimers[type]) cancelAnimationFrame(_rollTimers[type]);
  _rollTimers[type] = requestAnimationFrame(frame);
}

function stopRolling(type) {
  if (_rollTimers[type]) {
    cancelAnimationFrame(_rollTimers[type]);
    _rollTimers[type] = null;
  }
  _rollPos[type] = 0;
  _rollPaused[type] = false;
  var listEl = document.getElementById(type+'-list');
  var rollEl = document.getElementById(type+'-roll');
  if (listEl) { listEl.onmouseenter=null; listEl.onmouseleave=null; }
  if (rollEl) rollEl.style.transform = 'translateY(0)';
}

function submitNRAll(){
  var rs = document.getElementById('nr-mo-rs').value.trim();
  var sb = document.getElementById('nr-mo-sub').value.trim() || '미입력';
  if(!rs){ alert('사유를 입력해 주세요.'); return; }

  var nrFacs = window._nrFacs || [];
  // 체크된 것만
  var checked = nrFacs.filter(function(f, i){
    var chk = document.getElementById('nr-chk-'+i);
    return chk && chk.checked;
  });
  if(!checked.length){ alert('제출할 공장을 선택해 주세요.'); return; }

  var btn = document.getElementById('nr-mo-btn');
  btn.textContent = '제출 중...'; btn.disabled = true;

  var remaining = checked.length;
  var errors = 0;

  checked.forEach(function(f){
    gasCall({
      action:'saveReason', date:curDate, factoryName:f.name,
      addr:f.addr||'', woori:f.woori||0, hyundai:f.hyundai||0, total:f.total||0,
      reason:rs, submitter:sb
    }, function(err){
      remaining--;
      if(err) errors++;
      if(remaining === 0){
        btn.textContent = '체크된 공장 일괄 제출'; btn.disabled = false;
        closeNRModal();
        loadReasons();
        alert(checked.length + '개 공장 사유 제출 완료' + (errors>0?' ('+errors+'건 실패)':''));
      }
    });
  });
}
